<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palaash | Blue-Core Nutrition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000; --card: #0d0d0d; --text: #ffffff; --dim: #666;
            --accent: #007aff; /* Electric Blue */
            --danger: #ff3b30; --border: #1a1a1a;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .dashboard { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        @media (max-width: 1000px) { .dashboard { grid-template-columns: 1fr; height: auto; } }

        /* Sidebar History */
        .sidebar { background: #050505; border-right: 1px solid var(--border); padding: 30px; overflow-y: auto; }
        .sidebar h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); margin-bottom: 20px; }
        .history-card { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .h-date { font-weight: 900; font-size: 0.85rem; margin-bottom: 4px; }
        .h-stats { font-size: 0.75rem; color: var(--accent); font-weight: 700; }

        /* Content Panel */
        .main-panel { padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0a0e14, #000); }
        .date-header { font-size: 1.8rem; font-weight: 900; margin-bottom: 30px; letter-spacing: -1px; color: var(--accent); }

        /* Top Progress */
        .progress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 16px; }
        .stat-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .bar-wrap { background: #1a1a1a; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.8s ease; background: var(--accent); }

        /* Meal Cards Grid */
        .meal-flex { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .meal-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 25px; height: fit-content; }
        .meal-card h3 { margin: 0 0 20px 0; font-weight: 900; font-size: 1rem; color: var(--text); border-left: 4px solid var(--accent); padding-left: 12px; display: flex; justify-content: space-between; }
        .meal-card h3 span { color: var(--accent); font-size: 0.85rem; opacity: 0.8; }

        /* Search */
        .search-wrap { position: relative; margin-bottom: 15px; }
        .search-bar { width: 100%; background: #000; border: 1.5px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        .search-bar:focus { border-color: var(--accent); }
        .results { position: absolute; width: 100%; background: #111; z-index: 100; border-radius: 10px; border: 1px solid #333; margin-top: 5px; display: none; }
        .res-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .res-item:hover { background: var(--accent); color: #000; }

        /* Log Table */
        .log-row { display: grid; grid-template-columns: 1fr 90px 60px 20px; gap: 8px; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        .food-label { font-size: 0.85rem; font-weight: 700; color: #eee; }
        .qty-input-wrap { display: flex; align-items: center; background: #000; border: 1px solid #222; border-radius: 6px; padding: 2px 5px; }
        .qty-box { background: transparent; border: none; color: var(--accent); width: 35px; text-align: center; font-weight: 900; font-family: inherit; font-size: 0.85rem; outline: none; }
        .unit-label { font-size: 0.65rem; color: #555; text-transform: uppercase; font-weight: 800; }
        .cal-label { font-size: 0.8rem; font-weight: 900; text-align: right; color: var(--text); }
        .del-btn { color: var(--danger); cursor: pointer; text-align: right; font-weight: bold; opacity: 0.6; }

        .sync-btn { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #fff; border: none; padding: 20px 40px; border-radius: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3); }
    </style>
</head>
<body>

<div class="dashboard">
    <aside class="sidebar">
        <h2>Past Records</h2>
        <div id="history-target"></div>
    </aside>

    <main class="main-panel">
        <div class="date-header" id="display-date">--</div>

        <div class="progress-grid">
            <div class="stat-box">
                <div class="stat-title">Daily Calories <span id="label-cal">0 / 2000</span></div>
                <div class="bar-wrap"><div id="fill-cal" class="bar-fill"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Protein Intake <span id="label-pro">0 / 160g</span></div>
                <div class="bar-wrap"><div id="fill-pro" class="bar-fill" style="background: #ffffff; opacity: 0.2;"></div><div id="fill-pro-actual" class="bar-fill" style="margin-top:-8px; background: var(--accent);"></div></div>
            </div>
        </div>

        <div class="meal-flex">
            <div class="meal-card" id="card-Breakfast">
                <h3>BREAKFAST <span id="sum-Breakfast">0 kcal</span></h3>
                <div class="search-wrap"><input type="text" class="search-bar" placeholder="Add food..." onkeyup="search(this, 'Breakfast')"><div class="results"></div></div>
                <div id="list-Breakfast"></div>
            </div>

            <div class="meal-card" id="card-Lunch">
                <h3>LUNCH <span id="sum-Lunch">0 kcal</span></h3>
                <div class="search-wrap"><input type="text" class="search-bar" placeholder="Add food..." onkeyup="search(this, 'Lunch')"><div class="results"></div></div>
                <div id="list-Lunch"></div>
            </div>

            <div class="meal-card" id="card-Dinner">
                <h3>DINNER <span id="sum-Dinner">0 kcal</span></h3>
                <div class="search-wrap"><input type="text" class="search-bar" placeholder="Add food..." onkeyup="search(this, 'Dinner')"><div class="results"></div></div>
                <div id="list-Dinner"></div>
            </div>

            <div class="meal-card" id="card-Extras">
                <h3 style="border-color: #555;">EXTRAS & SNACKS <span id="sum-Extras">0 kcal</span></h3>
                <div class="search-wrap"><input type="text" class="search-bar" placeholder="Tea, Bhel, Fruit..." onkeyup="search(this, 'Extras')"><div class="results"></div></div>
                <div id="list-Extras"></div>
            </div>
        </div>
    </main>
</div>

<button class="sync-btn" onclick="sync()">Sync to Cloud</button>

<script>
    const BIN_ID = "69dd4b3daaba882197f602cc";
    const MASTER_KEY = "$2a$10$YQk1pT7CGVIENTmZtB7f8O3neLsrOAPoLYhpPC3B0pwEA4WfPxAUy";

    const db = [
        { name: "Rotli (Ghee)", cals: 135, pro: 3, unit: "pc" },
        { name: "Rotli (Plain)", cals: 110, pro: 3, unit: "pc" },
        { name: "Bhindi Sabji", cals: 140, pro: 2, unit: "kat" },
        { name: "Tuvar Dal", cals: 150, pro: 7, unit: "kat" },
        { name: "Rice (Basmati)", cals: 130, pro: 2.5, unit: "kat" },
        { name: "Milk Tea (Sugar)", cals: 90, pro: 2, unit: "cup" },
        { name: "Bhel Puri", cals: 210, pro: 4, unit: "plate" },
        { name: "Banana", cals: 105, pro: 1, unit: "pc" },
        { name: "Apple", cals: 95, pro: 0.5, unit: "pc" },
        { name: "Whey Protein", cals: 120, pro: 25, unit: "scp" },
        { name: "Mixed Nuts", cals: 160, pro: 5, unit: "hand" }
    ];

    let history = [];
    const todayStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    let today = { date: todayStr, Breakfast: [], Lunch: [], Dinner: [], Extras: [] };

    document.getElementById('display-date').innerText = todayStr;

    async function init() {
        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
            const d = await r.json();
            history = d.record.history || [];
            const existing = history.find(h => h.date === todayStr);
            if(existing) today = JSON.parse(JSON.stringify(existing));
            renderHistory();
            render();
        } catch(e) { console.log("Init fail"); }
    }

    function search(el, meal) {
        const q = el.value.toLowerCase();
        const box = el.nextElementSibling;
        box.innerHTML = '';
        if(q.length < 1) { box.style.display = 'none'; return; }
        db.filter(f => f.name.toLowerCase().includes(q)).forEach(item => {
            const div = document.createElement('div');
            div.className = 'res-item';
            div.innerHTML = `<span>${item.name}</span><span>${item.unit}</span>`;
            div.onclick = () => {
                today[meal].push({...item, qty: 1});
                el.value = ''; box.style.display = 'none';
                render();
            };
            box.appendChild(div);
        });
        box.style.display = 'block';
    }

    function updateQty(meal, idx, val) {
        today[meal][idx].qty = parseFloat(val) || 0;
        render();
    }

    function remove(meal, idx) {
        today[meal].splice(idx, 1);
        render();
    }

    function render() {
        let tCal = 0, tPro = 0;
        ["Breakfast", "Lunch", "Dinner", "Extras"].forEach(m => {
            const list = document.getElementById(`list-${m}`);
            const sum = document.getElementById(`sum-${m}`);
            let subCal = 0;
            list.innerHTML = '';
            today[m].forEach((it, i) => {
                const c = Math.round(it.cals * it.qty);
                const p = Math.round(it.pro * it.qty);
                subCal += c; tCal += c; tPro += p;
                list.innerHTML += `
                <div class="log-row">
                    <div class="food-label">${it.name}</div>
                    <div class="qty-input-wrap">
                        <input type="number" step="0.5" class="qty-box" value="${it.qty}" oninput="updateQty('${m}', ${i}, this.value)">
                        <span class="unit-label">${it.unit}</span>
                    </div>
                    <div class="cal-label">${c}</div>
                    <div class="del-btn" onclick="remove('${m}', ${i})">✕</div>
                </div>`;
            });
            sum.innerText = `${subCal} kcal`;
        });

        document.getElementById('label-cal').innerText = `${tCal} / 2000`;
        document.getElementById('label-pro').innerText = `${tPro} / 160g`;
        document.getElementById('fill-cal').style.width = Math.min((tCal/2000)*100, 100) + '%';
        document.getElementById('fill-pro-actual').style.width = Math.min((tPro/160)*100, 100) + '%';
    }

    function renderHistory() {
        const box = document.getElementById('history-target');
        box.innerHTML = '';
        history.slice().reverse().forEach(h => {
            let dc = 0;
            ["Breakfast","Lunch","Dinner","Extras"].forEach(m => h[m].forEach(i => dc += (i.cals * i.qty)));
            box.innerHTML += `<div class="history-card">
                <div class="h-date">${h.date}</div>
                <div class="h-stats">${Math.round(dc)} kcal</div>
            </div>`;
        });
    }

    async function sync() {
        const btn = document.querySelector('.sync-btn');
        btn.innerText = "SYNCING...";
        const idx = history.findIndex(h => h.date === todayStr);
        if(idx > -1) history[idx] = today; else history.push(today);
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify({ history: history })
            });
            btn.innerText = "SUCCESS";
            setTimeout(() => btn.innerText = "Sync to Cloud", 2000);
            renderHistory();
        } catch(e) { alert("Sync Failed"); btn.innerText = "Sync to Cloud"; }
    }

    init();
</script>
</body>
</html>
