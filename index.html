<!DOCTYPE html>
<html>
<head>
  <title>Personal Calorie Tracker</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    input, select, button {
      margin: 5px;
      padding: 5px;
    }
    .food-row {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }
  </style>
</head>
<body>

<h2>Calorie Tracker</h2>

<h3>Total: <span id="total">0</span> kcal</h3>

<select id="food">
  <option value="roti">Roti</option>
  <option value="dal">Dal</option>
  <option value="rice">Rice</option>
  <option value="sabzi">Sabzi</option>
</select>

<input type="number" id="quantity" placeholder="Quantity" step="0.1">

<input type="number" id="calories" placeholder="Calories per unit">

<button onclick="addFood()">Add</button>

<h3>Log</h3>
<div id="log"></div>

<button onclick="resetDay()">Reset Day</button>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {
  total: 0,
  log: []
};

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

function render() {
  document.getElementById("total").innerText = data.total;

  let logDiv = document.getElementById("log");
  logDiv.innerHTML = "";

  data.log.forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "food-row";
    div.innerHTML = `
      ${item.name} - ${item.qty} × ${item.cal} = ${item.total} kcal
      <button onclick="remove(${index})">X</button>
    `;
    logDiv.appendChild(div);
  });
}

function addFood() {
  let name = document.getElementById("food").value;
  let qty = parseFloat(document.getElementById("quantity").value);
  let cal = parseFloat(document.getElementById("calories").value);

  if (!qty || !cal) return;

  let total = qty * cal;

  data.total += total;

  data.log.push({
    name,
    qty,
    cal,
    total
  });

  save();
  render();
}

function remove(index) {
  data.total -= data.log[index].total;
  data.log.splice(index, 1);
  save();
  render();
}

function resetDay() {
  data = { total: 0, log: [] };
  save();
  render();
}

render();
</script>

</body>
</html>
